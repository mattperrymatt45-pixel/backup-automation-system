<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>BackupBot {% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #0d0f14;
      --surface:  #141720;
      --border:   #1e2330;
      --accent:   #00e5a0;
      --accent2:  #5b6cff;
      --danger:   #ff4d6d;
      --muted:    #4a5168;
      --text:     #cdd6f0;
      --text-dim: #636b85;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    /* ── Sidebar ── */
    .sidebar {
      position: fixed; top: 0; left: 0;
      width: 220px; height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 28px 0;
      z-index: 100;
    }
    .sidebar-logo {
      padding: 0 24px 28px;
      font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px;
      color: var(--accent);
    }
    .sidebar-logo span { color: var(--text-dim); font-weight: 400; font-size: 0.75rem; display:block; margin-top:2px; }
    .nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 24px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.85rem; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
      border-left: 2px solid transparent;
      transition: all 0.15s;
    }
    .nav-link:hover, .nav-link.active {
      color: var(--text);
      border-left-color: var(--accent);
      background: rgba(0,229,160,0.05);
    }
    .nav-icon { font-size: 1rem; width: 18px; text-align: center; }

    /* ── Main ── */
    .main { margin-left: 220px; padding: 36px 40px; }
    .page-title {
      font-size: 1.6rem; font-weight: 800;
      letter-spacing: -0.5px; margin-bottom: 6px;
    }
    .page-sub { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 32px; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .card-label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-dim);
      margin-bottom: 16px;
    }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-dim);
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      text-align: left;
    }
    td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem; color: var(--accent2);
      background: rgba(91,108,255,0.1);
      padding: 2px 6px; border-radius: 4px;
    }

    /* ── Badges ── */
    .badge-success { color: var(--accent); background: rgba(0,229,160,0.1); border: 1px solid rgba(0,229,160,0.2); padding: 3px 9px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .badge-failed  { color: var(--danger); background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.2); padding: 3px 9px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .badge-manual  { color: var(--text-dim); background: rgba(74,81,104,0.2); border: 1px solid var(--border); padding: 3px 9px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

    /* ── Buttons ── */
    .btn-accent {
      background: var(--accent); color: #0d0f14;
      border: none; padding: 8px 18px; border-radius: 6px;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.82rem; cursor: pointer; text-decoration: none;
      display: inline-block; transition: opacity 0.15s;
    }
    .btn-accent:hover { opacity: 0.85; }
    .btn-ghost {
      background: transparent; color: var(--text-dim);
      border: 1px solid var(--border); padding: 7px 16px; border-radius: 6px;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.82rem; cursor: pointer; text-decoration: none;
      display: inline-block; transition: all 0.15s;
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }
    .btn-danger {
      background: transparent; color: var(--danger);
      border: 1px solid rgba(255,77,109,0.3); padding: 6px 14px; border-radius: 6px;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.78rem; cursor: pointer; transition: all 0.15s;
    }
    .btn-danger:hover { background: rgba(255,77,109,0.1); }
    .btn-run {
      background: rgba(0,229,160,0.1); color: var(--accent);
      border: 1px solid rgba(0,229,160,0.2); padding: 6px 14px; border-radius: 6px;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.78rem; cursor: pointer; transition: all 0.15s;
    }
    .btn-run:hover { background: rgba(0,229,160,0.18); }

    /* ── Form ── */
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 7px; }
    input[type=text], select, textarea {
      width: 100%; background: var(--bg);
      border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); padding: 10px 14px;
      font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
      outline: none; transition: border-color 0.15s;
    }
    input[type=text]:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--surface); }
    .hint { font-size: 0.75rem; color: var(--text-dim); margin-top: 5px; font-family: 'JetBrains Mono', monospace; }

    /* ── Alerts ── */
    .alert {
      padding: 12px 16px; border-radius: 8px;
      font-size: 0.85rem; margin-bottom: 20px;
      border: 1px solid;
    }
    .alert-success { color: var(--accent); background: rgba(0,229,160,0.07); border-color: rgba(0,229,160,0.2); }
    .alert-danger  { color: var(--danger); background: rgba(255,77,109,0.07); border-color: rgba(255,77,109,0.2); }
    .alert-info    { color: var(--accent2); background: rgba(91,108,255,0.07); border-color: rgba(91,108,255,0.2); }

    /* ── Stat boxes ── */
    .stats { display: flex; gap: 16px; margin-bottom: 28px; }
    .stat-box {
      flex: 1; background: var(--surface);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 20px 22px;
    }
    .stat-val { font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
    .stat-key { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-top: 2px; }

    .empty-row td { color: var(--text-dim); font-style: italic; text-align: center; padding: 28px; }
  </style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">BackupBot <span>Automation System</span></div>
  <a href="{{ url_for('dashboard') }}"  class="nav-link {% if request.endpoint=='dashboard' %}active{% endif %}">
    <span class="nav-icon">⬛</span> Dashboard
  </a>
  <a href="{{ url_for('new_job') }}"    class="nav-link {% if request.endpoint=='new_job' %}active{% endif %}">
    <span class="nav-icon">＋</span> New Job
  </a>
  <a href="{{ url_for('restore') }}"    class="nav-link {% if request.endpoint=='restore' %}active{% endif %}">
    <span class="nav-icon">↩</span> Restore
  </a>
  <a href="{{ url_for('all_logs') }}"   class="nav-link {% if request.endpoint=='all_logs' %}active{% endif %}">
    <span class="nav-icon">≡</span> All Logs
  </a>
</nav>

<main class="main">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>

</body>
</html>
